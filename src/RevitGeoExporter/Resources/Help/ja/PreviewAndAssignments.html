<h1>プレビューと割り当て</h1>
<p>プレビューウィンドウでは、GeoPackage を書き出す前に準備済みのジオメトリを確認できます。ファイルはまだ書き込まれません。</p>
<h2>確認できる内容</h2>
<ul>
<li>units、openings、details、levels の表示切り替え</li>
<li>警告、上書き済み床、未割り当て床の確認</li>
<li>キャンバス上のフィーチャをクリックしてメタデータ確認</li>
</ul>
<h2>床カテゴリの割り当て</h2>
<p>未割り当ての床由来ユニットは、床タイプ名ごとにまとめてカテゴリを割り当てられます。これは書き出し用のプロジェクト設定であり、Revit モデルの名前変更やパラメータ書き換えは行いません。</p>
</body></html>
