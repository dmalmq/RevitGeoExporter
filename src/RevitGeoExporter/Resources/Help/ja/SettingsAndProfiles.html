<!DOCTYPE html>
<html><head><meta charset="utf-8" /><title>設定とプロファイル</title><style>body{font-family:"Segoe UI",sans-serif;margin:24px;line-height:1.55;color:#2a2a2a}h1,h2{color:#16324f}</style></head><body>
<h1>設定とプロファイル</h1>
<p>設定ハブでは、<strong>グローバル</strong>既定値と<strong>プロジェクト</strong>ごとのマッピングを分けて管理します。</p>
<h2>グローバル</h2>
<ul>
<li>既定の出力フォルダー</li>
<li>UI 言語</li>
<li>CRS / EPSG</li>
<li>診断、パッケージ、補正の既定値</li>
<li>グローバルのエクスポートプロファイル</li>
</ul>
<h2>プロジェクト</h2>
<ul>
<li>床タイプからカテゴリへのマッピング</li>
<li>ファミリカテゴリ上書き</li>
<li>許可された開口ファミリ</li>
<li>プロジェクトスコープのエクスポートプロファイル</li>
</ul>
</body></html>
