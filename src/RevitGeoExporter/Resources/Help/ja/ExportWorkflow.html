<h1>エクスポートの流れ</h1>
<p>エクスポートダイアログでは、ビュー、フィーチャレイヤー、CRS、パッケージ出力、ジオメトリ補正をまとめて設定できます。</p>
<h2>一般的な手順</h2>
<ol>
<li>平面ビューを1つ以上選択します。</li>
<li><code>unit</code>、<code>detail</code>、<code>opening</code>、<code>level</code> の出力対象を選びます。</li>
<li>出力フォルダー、EPSG、診断、パッケージ、補正設定を確認します。</li>
<li>必要であれば <strong>プレビュー</strong> で書き出し結果を確認します。</li>
<li>書き出しを実行し、検証ダイアログを確認します。</li>
<li>書き出し後にファイル、警告、パッケージ、変更サマリーを確認します。</li>
</ol>
</body></html>
