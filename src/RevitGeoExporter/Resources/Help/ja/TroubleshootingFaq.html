<h1>トラブルシューティング / FAQ</h1>
<h2>QGIS に何かが出てこない</h2>
<p>まずプレビューと検証ダイアログを確認してください。欠落した垂直ユニット、スナップできなかった開口、未対応ファミリは通常ここに警告として表示されます。</p>
<h2>床が unspecified になった</h2>
<p>床タイプ名が既知のカテゴリに解決されていません。プレビューの割り当て機能またはプロジェクトマッピングで上書きを追加してください。</p>
<h2>設定の保存場所</h2>
<p>グローバル設定とプロジェクトマッピングは RevitGeoExporter のアプリケーションデータ領域に保存されます。設定ハブから各スコープの読み込み、書き出し、リセットができます。</p>
</body></html>
