<!DOCTYPE html>
<html><head><meta charset="utf-8" /><title>検証と診断</title><style>body{font-family:"Segoe UI",sans-serif;margin:24px;line-height:1.55;color:#2a2a2a}h1,h2{color:#16324f}</style></head><body>
<h1>検証と診断</h1>
<p>エクスポーターはファイルを書き出す前に準備済みデータを検証し、必要に応じて診断レポートを出力します。</p>
<h2>主な検証項目</h2>
<ul>
<li>未割り当ての床由来ユニット</li>
<li>必要な export ID の欠落または重複</li>
<li>空または無効なジオメトリ</li>
<li>未対応の開口ファミリとスナップできなかった開口</li>
<li>出力可能フィーチャがないビュー</li>
<li>欠落した垂直動線出力</li>
</ul>
</body></html>
